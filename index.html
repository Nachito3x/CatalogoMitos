                        Nuevo Mazo</h2>

    <!-- Toast Notifications Container -->
    <div id="toastContainer"
        class="fixed bottom-24 md:bottom-8 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // Sistema de notificaciones Toast
        window.showToast = function (message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');

            let bgClass = 'bg-surface-container-high';
            let borderClass = 'border-primary/30';
            let icon = 'info';
            let iconColor = 'text-primary';

            if (type === 'error') {
                bgClass = 'bg-error-container';
                borderClass = 'border-error/50';
                icon = 'error';
                iconColor = 'text-error';
            } else if (type === 'success') {
                bgClass = 'bg-surface-container-highest';
                borderClass = 'border-primary/60';
                icon = 'check_circle';
                iconColor = 'text-primary';
            } else if (type === 'warning') {
                bgClass = 'bg-surface-variant';
                borderClass = 'border-secondary/50';
                icon = 'warning';
                iconColor = 'text-secondary';
            }

            toast.className = `flex flex-row items-center gap-3 px-4 py-3 min-w-[250px] max-w-sm rounded-lg border shadow-2xl pointer-events-auto transform transition-all duration-300 translate-y-8 opacity-0 ${bgClass} ${borderClass}`;

            const formattedMessage = message.replace(/\n/g, '<br/>');

            toast.innerHTML = `
                <span class="material-symbols-outlined ${iconColor}" data-icon="${icon}">${icon}</span>
                <p class="text-on-surface text-sm font-serif leading-snug flex-1">${formattedMessage}</p>
                <button class="ml-2 text-outline hover:text-on-surface transition-colors" onclick="this.parentElement.remove()">
                    <span class="material-symbols-outlined text-sm" data-icon="close">close</span>
                </button>
            `;

            container.appendChild(toast);

            // Entrada
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-8', 'opacity-0');
            });

            // Salida
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-4');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        };

        // Lógica visual de la UI de Estrategia
        window.updateStrategy = function (selectedValue) {
            document.getElementById('deckStrategy').value = selectedValue;
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                if (btn.getAttribute('data-value') === selectedValue) {
                    btn.className = "strategy-btn px-4 py-2 border border-primary/40 bg-primary/10 text-primary text-xs font-bold uppercase tracking-widest hover:bg-primary/20 transition-colors";
                } else {
                    btn.className = "strategy-btn px-4 py-2 border border-outline-variant text-outline text-xs font-bold uppercase tracking-widest hover:border-primary/40 hover:text-primary transition-colors";
                }
            });
        };

        // Lógica para actualizar las razas según la expansión seleccionada
        window.updateRaces = function (expansion) {
            const razaSelect = document.getElementById('deckRaza');
            razaSelect.innerHTML = '';

            let opciones = [];
            if (expansion === 'Espada Sagrada') {
                opciones = ['Caballero', 'Dragón', 'Faire'];
            } else if (expansion === 'Helénica') {
                opciones = ['Titán', 'Olimpico', 'Heroe'];
            } else if (expansion === 'Hijos de Daana') {
                opciones = ['Defensor', 'Desafiante', 'Sombra'];
            } else if (expansion === 'Dominios de Ra') {
                opciones = ['Sacerdote', 'Eterno', 'Faraón'];
            }

            opciones.forEach(raza => {
                const opt = document.createElement('option');
                opt.value = raza;
                opt.textContent = raza;
                razaSelect.appendChild(opt);
            });
        };

        let cartasData = [];

        // Cargar cartas JSON original al iniciar de forma asíncrona
        fetch('./json/Cartas_tionacho.json')
            .then(res => res.json())
            .then(data => {
                cartasData = data;
            })
            .catch(err => console.error("Error cargando cartas localmente:", err));

        let cartasPreFiltradas = [];

        // Abrir y cargar modal renderizado con las variables seleccionadas
        window.abrirModalSeleccionCartas = function () {
            const modal = document.getElementById('cardSelectionModal');
            const expansion = document.getElementById('deckExpansion').value;

            // Limpiamos los filtros del modal para no arrastrar busquedas anteriores
            document.getElementById('modalSearchInput').value = '';
            document.getElementById('modalTypeFilter').value = 'todo';

            // Mostrar modal inmediatamente
            modal.classList.remove('hidden');

            const gallery = document.getElementById('modalGallery');
            gallery.innerHTML = '<div class="col-span-full h-48 flex items-center justify-center text-outline/50"><span class="material-symbols-outlined animate-spin text-4xl" style="animation: spin 2s linear infinite;">sync</span><span class="ml-3 font-serif italic text-sm">Forjando visuales...</span></div>';

            // Usamos setTimeout(0) para ceder ejecución al paint del browser
            setTimeout(() => {
                const normalizeText = str => (str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace('faire', 'faerie').trim();
                const expFiltro = normalizeText(expansion);

                cartasPreFiltradas = cartasData.filter(c =>
                    normalizeText(c.expansion) === expFiltro
                );

                window.filtrarGaleria();
            }, 50);
        };

        window.filtrarGaleria = function () {
            const gallery = document.getElementById('modalGallery');
            const searchVal = (document.getElementById('modalSearchInput').value || '').toLowerCase();
            const typeVal = document.getElementById('modalTypeFilter').value.toLowerCase();

            let finalCards = cartasPreFiltradas;

            if (searchVal) {
                const normalizeText = str => (str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                const searchNorm = normalizeText(searchVal);
                finalCards = finalCards.filter(c => normalizeText(c.nombre).includes(searchNorm));
            }

            if (typeVal !== 'todo') {
                const typeNorm = typeVal === 'talisman' ? 'talisman' : (typeVal === 'totem' ? 'totem' : typeVal);
                const normalizeText = str => (str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                finalCards = finalCards.filter(c => normalizeText(c.tipo) === typeNorm);
            }

            if (finalCards.length === 0) {
                gallery.innerHTML = '<div class="col-span-full h-48 flex items-center justify-center text-outline/50 font-serif italic text-sm">No se encontraron reliquias con esos filtros.</div>';
                return;
            }

            gallery.innerHTML = finalCards.map(carta => {
                const secureImgUrl = carta.imagen_url ? carta.imagen_url.replace(/'/g, "\\'") : '';
                const secureName = carta.nombre ? carta.nombre.replace(/'/g, "\\'") : 'Reliquia';
                return `
                    <div class="relative cursor-zoom-in transition-transform transform-gpu hover:scale-110 hover:z-10 hover:shadow-[0_0_20px_rgba(242,202,80,0.5)] duration-200" title="${carta.nombre} - ${carta.tipo}" onclick="window.mostrarCartaGrande('${secureImgUrl}', '${secureName}')">
                        ${carta.imagen_url ? `<img src="${carta.imagen_url}" loading="lazy" alt="Imagen ${carta.nombre}" class="w-full h-auto rounded-md shadow-md" onerror="this.src=''; this.parentElement.innerHTML='<div class=\\'aspect-[7/10] w-full bg-surface-container rounded-md flex items-center justify-center border border-outline-variant/30 text-outline/40 uppercase tracking-widest font-bold text-[10px] text-center p-2\\'>Reliquia Perdida<br>${carta.nombre}</div>';">` : `<div class="aspect-[7/10] w-full bg-surface-container rounded-md flex items-center justify-center border border-outline-variant/30 text-outline/40 uppercase tracking-widest font-bold text-[10px] text-center p-2">Reliquia Perdida<br>${carta.nombre}</div>`}
                    </div>
                `;
            }).join('');
        };

        window.mostrarCartaGrande = function (imgUrl, nombre) {
            if (!imgUrl) return;
            const container = document.getElementById('modalImageOverlay');
            const imgEl = document.getElementById('modalBigImage');
            imgEl.src = imgUrl;
            imgEl.alt = nombre;
            
            // Render visible but faded out
            container.classList.remove('hidden');
            container.classList.add('flex');
            
            // Trigger animation
            setTimeout(() => {
                imgEl.classList.remove('scale-95');
                imgEl.classList.add('scale-100');
            }, 10);
        };

        window.ocultarCartaGrande = function () {
            const container = document.getElementById('modalImageOverlay');
            const imgEl = document.getElementById('modalBigImage');
            
            imgEl.classList.remove('scale-100');
            imgEl.classList.add('scale-95');
            
            setTimeout(() => {
                container.classList.add('hidden');
                container.classList.remove('flex');
                imgEl.src = "";
            }, 200);
        };
    </script>
    <script type="module" src="js/validaciones.js"></script>
</body>

</html>
